name: Deploy Supabase

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-supabase.yml'
  workflow_dispatch:
    inputs:
      deploy_functions:
        description: 'Deploy edge functions'
        required: false
        default: 'true'
        type: boolean
      run_migrations:
        description: 'Run DB migrations'
        required: false
        default: 'true'
        type: boolean

concurrency:
  group: deploy-supabase-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Supabase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ----------------------------------------------------------------
      # Step 1 — Run database migrations
      # ----------------------------------------------------------------
      - name: Run DB migrations
        if: ${{ inputs.run_migrations != 'false' }}
        run: supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      # ----------------------------------------------------------------
      # Step 2 — Deploy all edge functions
      # ----------------------------------------------------------------
      - name: Deploy edge functions
        if: ${{ inputs.deploy_functions != 'false' }}
        run: supabase functions deploy --no-verify-jwt
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # ----------------------------------------------------------------
      # Step 3 — Set edge function secrets
      # (only runs when secrets are present)
      # ----------------------------------------------------------------
      - name: Set edge function secrets
        run: |
          supabase secrets set \
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
            OPEN_EXCHANGE_RATES_APP_ID=${{ secrets.OPEN_EXCHANGE_RATES_APP_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Notify success
        if: success()
        run: |
          echo "✅ Supabase deployment complete"
          echo "  • Migrations applied"
          echo "  • Edge functions deployed"
          echo "  • Secrets updated"
