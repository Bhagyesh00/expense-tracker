name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/**'
      - '.github/workflows/deploy-web.yml'
      - 'pnpm-lock.yaml'

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: false  # Never cancel an in-flight production deploy

jobs:
  deploy:
    name: Deploy to Vercel (production)
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Deploy to Vercel (production)
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy \
            --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            2>&1 | tail -1)
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $DEPLOY_URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Comment deployment URL on related PRs
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const deployUrl = '${{ steps.deploy.outputs.url }}';
            const sha = context.sha;

            const { data: prs } = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: sha,
            });

            for (const pr of prs) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: [
                  '### Production deployment complete',
                  '',
                  `Deployed commit \`${sha.slice(0, 7)}\` to production.`,
                  '',
                  `**URL:** ${deployUrl}`,
                ].join('\n'),
              });
            }

      - name: Notify Slack on failure
        if: failure() && vars.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":x: *ExpenseFlow production deploy failed*",
              "attachments": [{
                "color": "danger",
                "fields": [
                  { "title": "Commit", "value": "${{ github.sha }}", "short": true },
                  { "title": "Branch", "value": "${{ github.ref_name }}", "short": true },
                  { "title": "Run", "value": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}", "short": false }
                ]
              }]
            }
